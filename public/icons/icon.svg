<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M64 8 L16 28 L16 60 C16 88 36 112 64 124 C92 112 112 88 112 60 L112 28 Z"
        fill="url(#shieldGrad)"/>
  <!-- Lock body -->
  <rect x="44" y="60" width="40" height="32" rx="4" fill="url(#lockGrad)"/>
  <!-- Lock shackle -->
  <path d="M52 60 L52 48 C52 38 58 32 64 32 C70 32 76 38 76 48 L76 60"
        fill="none" stroke="url(#lockGrad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="64" cy="74" r="6" fill="#1976d2"/>
  <rect x="62" y="76" width="4" height="8" rx="1" fill="#1976d2"/>
  <!-- Checkmark -->
  <path d="M50 68 L60 78 L80 58" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
